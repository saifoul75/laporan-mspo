name: CI

on:
  push:
    branches: [master]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".kilo/**"
      - "backup.ps1"
      - ".github/dependabot.yml"
  pull_request:
    branches: [master]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".kilo/**"
      - "backup.ps1"
      - ".github/dependabot.yml"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semak:
    name: Lint, Typecheck & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: "https://lbklwflwiujdnuricxbt.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "sb_publishable_ctXaZUlUx0O0hZsdwMSd4A_ERv7Ecwt"
